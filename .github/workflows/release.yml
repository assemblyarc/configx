name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS — Apple Silicon
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: configx-aarch64-apple-darwin.tar.gz

          # macOS — Intel
          - target: x86_64-apple-darwin
            os: macos-13
            archive: configx-x86_64-apple-darwin.tar.gz

          # Linux — x86_64 (musl for maximum portability)
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: configx-x86_64-linux.tar.gz

          # Linux — aarch64 (musl)
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            archive: configx-aarch64-linux.tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # cross is used for Linux cross-compilation targets
      - name: Install cross (Linux only)
        if: runner.os == 'Linux'
        uses: taiki-e/install-action@cross

      - name: Build (macOS native)
        if: runner.os == 'macOS'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (Linux via cross)
        if: runner.os == 'Linux'
        run: cross build --release --target ${{ matrix.target }}

      - name: Create archive
        shell: bash
        run: |
          BINARY=target/${{ matrix.target }}/release/configx
          tar -czf ${{ matrix.archive }} -C "$(dirname $BINARY)" "$(basename $BINARY)"

      - name: Compute SHA256
        shell: bash
        run: |
          if command -v sha256sum &>/dev/null; then
            sha256sum ${{ matrix.archive }} | tee ${{ matrix.archive }}.sha256
          else
            shasum -a 256 ${{ matrix.archive }} | tee ${{ matrix.archive }}.sha256
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: |
            ${{ matrix.archive }}
            ${{ matrix.archive }}.sha256

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Print SHA256 checksums (for homebrew-core formula)
        run: |
          echo "=== SHA256 checksums for homebrew-core formula ==="
          cat artifacts/*.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: configx ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.sha256

  publish-crate:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
